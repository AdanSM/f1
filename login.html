<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/icones-d-administration-rouge.png" type="image/x-icon">
</head>
<body>

<form> 
    <div class="form-titulo">
        <img class="form-img" src="img/f1-logo.png" alt="">
            <h2 class="h2">Inicio de sesión</h2>
            </div>
        <fieldset>
            <legend>Información personal</legend>
        <div class="form"> 
            <label for="Nombre">Nombre
                <input class="input"class="input"class="input"type="text" placeholder="Nombre" id="Nombre">
            </label>
        </div>

        <div class="form"> 
            <label class="label" for="Apellido">Apellido
                <input class="input"class="input"class="input"type="text" placeholder="Apellido" id="Apellido">
            </label>
        </div>

        <div class="form"> 
            <label for="Edad">Edad
                <input class="input"class="input"class="input"type="number" placeholder="Edad" id="Edad">
            </label>
        </div>

        <div class="form"> 
            <label for="Email">Correo
                <input class="input" class="input"class="input" type="email" placeholder="Ejemplo@gmail.com" id="Email">
            </label>
        </div>
        
        <div class="form">
            <label for="password"> Contraseña
                <input class="input"class="input"class="input"type="password" placeholder="Tu Contraseña" id="password">
            </label>
        </div>

        </fieldset>
        
        <div class="btn-sign-in"> 
            <button class="btn-login">Iniciar</button>
        </div>
</form>

</body>
</html>
